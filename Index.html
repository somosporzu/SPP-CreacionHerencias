<style>
:root { --ink:#1a1209; --parch:#f5edd8; --parch-dark:#e8dbbf; --parch-mid:#ede1c4; --gold:#b8872a; --gold-light:#d4a84b; --green:#2d5a27; --red:#7a2020; --purple:#4a2070; --blue:#1a3050; --shadow:rgba(26,18,9,.18); }
*{box-sizing:border-box;margin:0;padding:0} body{background:var(--ink);color:var(--ink);font-family:Georgia,serif;min-height:100vh;background-image:linear-gradient(45deg,rgba(184,135,42,.05) 25%,transparent 25%,transparent 75%,rgba(184,135,42,.05) 75%),linear-gradient(45deg,rgba(184,135,42,.05) 25%,transparent 25%,transparent 75%,rgba(184,135,42,.05) 75%);background-size:60px 60px;background-position:0 0,30px 30px}
.page-wrap{max-width:1450px;margin:0 auto;padding:24px 16px} .page-header{text-align:center;margin-bottom:20px;padding:30px 24px 24px;background:linear-gradient(180deg,#2d1a05,#1a1209);border:2px solid var(--gold)} .page-header h1{font-family:Georgia,serif;font-size:clamp(1.4rem,3vw,2.2rem);color:var(--gold-light);letter-spacing:.05em;text-shadow:0 2px 8px #000} .page-header p{color:rgba(212,168,75,.7);font-size:.85rem;letter-spacing:.12em;text-transform:uppercase;margin-top:6px}
.tab-bar{display:flex;gap:2px;flex-wrap:wrap;border-bottom:2px solid var(--gold)} .tab-btn{padding:10px 14px;font-family:Georgia,serif;font-size:.75rem;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;border:1px solid transparent;border-bottom:none;background:rgba(26,18,9,.75);color:rgba(212,168,75,.65)} .tab-btn.active{background:var(--parch);color:var(--ink);border-color:var(--gold);border-bottom:2px solid var(--parch);margin-bottom:-2px;font-weight:700} .tab-btn:hover{color:var(--gold-light)}
.shell{background:var(--parch);border:1.5px solid var(--gold);border-top:none;padding:20px;box-shadow:0 6px 24px var(--shadow)} .card{background:var(--parch);border:1.5px solid var(--gold);padding:18px;box-shadow:0 4px 18px var(--shadow),inset 0 1px 0 rgba(255,255,255,.4);margin-bottom:16px} .card-title{font-size:1rem;font-weight:700;letter-spacing:.06em;color:var(--green);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--gold);text-transform:uppercase} .red{color:var(--red)} .purple{color:var(--purple)} .blue{color:var(--blue)}
.main-grid{display:grid;grid-template-columns:1fr 345px;gap:18px;align-items:start} @media(max-width:960px){.main-grid{grid-template-columns:1fr}.sticky-panel{position:static!important}} .sticky-panel{position:sticky;top:16px}
label{display:block;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:6px;font-weight:700} input,textarea,select{width:100%;padding:9px 12px;background:var(--parch-dark);border:1.5px solid rgba(184,135,42,.5);font-family:Georgia,serif;font-size:1rem;color:var(--ink);outline:none} textarea{resize:vertical}
.section{margin-bottom:8px;border:1px solid rgba(184,135,42,.3)} .section-header{width:100%;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;border:none;font-size:.76rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase} .section-header.green{background:#d4ebd0;color:var(--green);border:1px solid #a8d4a0} .section-header.red{background:#f0d0d0;color:var(--red);border:1px solid #d4a0a0} .section-header.purple{background:#e0d0f0;color:var(--purple);border:1px solid #b8a0d4} .section-header.blue{background:#d0dff0;color:var(--blue);border:1px solid #a0bcd4} .section-body{padding:10px;display:none} .section.open .section-body{display:block}
.trait-btn{width:100%;text-align:left;padding:8px 10px;margin-bottom:6px;border:1px solid rgba(184,135,42,.3);cursor:pointer;background:var(--parch-mid)} .trait-btn:hover{filter:brightness(.96);border-color:var(--gold)} .t-name{font-size:.8rem;font-weight:700} .t-desc{font-size:.82rem;color:#5a4020;margin-top:3px;line-height:1.35} .t-prereq{font-size:.74rem;color:var(--purple);margin-top:3px;font-style:italic} .ph-badge{display:inline-block;font-size:.7rem;font-weight:700;padding:1px 6px;margin-left:6px;border-radius:2px} .ph-pos{background:#d4ebd0;color:var(--green);border:1px solid #a8d4a0} .ph-neg{background:#f0d0d0;color:var(--red);border:1px solid #d4a0a0}
.balance-box{text-align:center;padding:16px;background:var(--parch-dark);border:1px solid var(--gold);margin-bottom:14px} .balance-num{font-size:2.6rem;line-height:1;font-weight:bold} .balance-label{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-top:4px} .issue-box{background:#f5d8d8;border:1.5px solid var(--red);padding:10px 14px;margin-bottom:12px;font-size:.88rem} .valid-box{background:#d4ebd0;border:1.5px solid var(--green);padding:10px 14px;margin-bottom:12px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--green);text-align:center}
.trait-chip{padding:8px 10px;background:var(--parch-mid);border-left:3px solid;margin-bottom:6px} .tc-head{display:flex;justify-content:space-between;gap:8px} .tc-name{font-size:.78rem;font-weight:700} .tc-desc{font-size:.78rem;color:#5a4020;margin-top:2px} .del-btn{background:none;border:none;cursor:pointer;color:var(--red);font-size:1.1rem;opacity:.75} .export-btn{width:100%;padding:12px;font-size:.85rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer} .enabled{background:linear-gradient(135deg,var(--green),#3d7a35);color:var(--parch)} .disabled{background:#bbb;color:#888;cursor:not-allowed}
.note{background:linear-gradient(135deg,#f5e8d8,#ede0c8);border:1px solid var(--gold);border-left:4px solid var(--purple);padding:12px 16px;margin-bottom:16px;font-size:.9rem;line-height:1.45} .rules-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:10px} .rule-item{background:var(--parch-dark);border:1px solid rgba(184,135,42,.4);padding:10px 12px;font-size:.88rem} .ri-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin-bottom:3px} .catalog-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:16px} .ref-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px} table{width:100%;border-collapse:collapse;font-size:.9rem} th,td{border:1px solid rgba(184,135,42,.35);padding:7px 8px;text-align:left;vertical-align:top} th{background:var(--blue);color:var(--parch);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}
</style>

<script>
const DATA = {"base": {"v": {"menor": [{"n": "Alas", "c": 1, "d": "Permite planear hasta 6 m desde una altura y amortiguar caídas. No otorga vuelo sostenido ni permite ganar altura. Visible y difícil de ocultar.", "req": "Prerequisito de Vuelo Real."}, {"n": "Armas Naturales Débiles", "c": 1, "d": "Garras, colmillos o cuernos pequeños. Infligen 1d6−3 cuerpo a cuerpo. No pueden desarmarse, pero no reciben mejoras de armas fabricadas."}, {"n": "Bioluminiscencia", "c": 1, "d": "Puedes emitir luz tenue hasta 3 m. Mientras esté activa en oscuridad o penumbra, sufres Desventaja en Sigilo visual."}, {"n": "Bolsas en la Mejilla", "c": 1, "d": "Puedes ocultar objetos pequeños en cavidades biológicas de boca o mejillas."}, {"n": "Bono de Habilidad Menor", "c": 1, "d": "Obtienes +1 a una tirada muy específica ligada a la biología de la Herencia.", "req": "Definir la tirada estrecha."}, {"n": "Cola Prensil", "c": 1, "d": "Tu cola puede sujetar objetos pequeños, ayudar al equilibrio y manipular elementos simples. No ataca ni reemplaza una mano diestra."}, {"n": "Duros de Cabeza", "c": 1, "d": "Obtienes +1 a tiradas para resistir intimidación, amenazas directas o presión por miedo."}, {"n": "Equilibrio Perfecto", "c": 1, "d": "Tienes Ventaja para evitar caer, perder equilibrio o ser derribado por terreno o empujones."}, {"n": "Estómago de Hierro", "c": 1, "d": "Tienes Ventaja en salvaciones contra enfermedades transmitidas por comida o agua en mal estado."}, {"n": "Familiaridad Animal", "c": 1, "d": "Obtienes +1 para calmar, guiar, interpretar o acercarte a un tipo específico de animal.", "req": "Elegir tipo de animal."}, {"n": "Fisiología Anfibia", "c": 1, "d": "Puedes respirar aire y agua. No otorga nado, visión submarina ni resistencia a presión."}, {"n": "Garras Retráctiles", "c": 1, "d": "Garras ocultables que infligen 1d6−3 Cortante. No se desarman ni reciben mejoras de armas fabricadas."}, {"n": "Instinto Animal", "c": 1, "d": "Tienes Ventaja para comunicarte o interactuar con animales; en etiqueta alta sufres Desventaja social mientras dure el protocolo."}, {"n": "Instinto Depredador", "c": 1, "d": "Obtienes +1 para rastrear criaturas que hayan sufrido daño recientemente."}, {"n": "Lectura Corporal", "c": 1, "d": "Obtienes +1 para detectar mentiras, emociones fingidas o intenciones disimuladas mediante señales no verbales."}, {"n": "Manos Hábiles", "c": 1, "d": "Obtienes +1 a artesanía fina, cirugía delicada, joyería, mecanismos pequeños o manipulación precisa."}, {"n": "Orientación Natural", "c": 1, "d": "Tienes Ventaja para orientarte, leer rutas naturales y evitar perderte fuera de asentamientos."}, {"n": "Párpados Nictitantes", "c": 1, "d": "Inmune a ceguera por arena, polvo, ceniza, salpicaduras leves o irritantes similares."}, {"n": "Pelo Aislante", "c": 1, "d": "Ventaja contra frío extremo. Cada vez que recibes daño de Fuego, recibes +1 adicional."}, {"n": "Percepción Aguda", "c": 1, "d": "Obtienes +1 a percepción basada en un sentido elegido.", "req": "Elegir sentido."}, {"n": "Piel de Piedra Menor", "c": 1, "d": "Ignoras 1 punto de daño de un tipo específico elegido.", "req": "Elegir tipo de daño."}, {"n": "Resistencia Aumentada", "c": 1, "d": "Aumentas en +5 tu Resistencia máxima. No da Ventaja contra dolor ni salvaciones."}, {"n": "Sentido de Vibración Menor", "c": 1, "d": "En contacto con superficies que transmiten vibración, obtienes +1 para detectar movimiento cercano."}, {"n": "Velocidad Mejorada", "c": 1, "d": "Tu velocidad base aumenta en +3 metros."}, {"n": "Visión en Penumbra", "c": 1, "d": "No sufres penalizadores normales en penumbra, luz tenue o noche clara. No ves en oscuridad total."}, {"n": "Coágulo de Emergencia", "c": 1, "d": "1/Descanso Largo, al quedar con mitad o menos de Resistencia máxima, recuperas 1d6 de Resistencia."}, {"n": "Impulso Suprarrenal", "c": 1, "d": "1/Descanso Largo, al quedar con mitad o menos de Resistencia máxima, obtienes +1 a Cuerpo hasta el final de tu próximo turno."}, {"n": "Reflejo de Supervivencia", "c": 1, "d": "1/Descanso Largo, al quedar con mitad o menos de Resistencia máxima, puedes moverte 3 m sin provocar ataques de oportunidad."}], "medio": [{"n": "Acróbata Nato", "c": 2, "d": "Ventaja en acrobacias, equilibrio, saltos arriesgados, piruetas, caídas controladas o superficies difíciles."}, {"n": "Adherencia Mural", "c": 2, "d": "Puedes trepar superficies verticales difíciles sin tirada si hay adherencia. Límites: superficies lisas, aceitosas o que no soportan tu peso."}, {"n": "Afinidad con una Fuerza", "c": 2, "d": "Elige una Fuerza o Energía Primigenia. El coste en PX para adquirir técnicas de esa Fuerza se reduce 10%. Puede tomarse dos veces con Fuerzas distintas."}, {"n": "Afinidad Elemental Menor", "c": 2, "d": "Pequeños efectos elementales inofensivos fuera de combate. No causa daño, no sustituye Técnicas ni herramientas complejas."}, {"n": "Arma Natural Potente", "c": 2, "d": "Arma corporal peligrosa que inflige 1d6 cuerpo a cuerpo. No puede desarmarse ni recibir mejoras de armas fabricadas."}, {"n": "Aura Imponente", "c": 2, "d": "Ventaja en intimidación, presencia o persuasión basada en primera impresión ante criaturas que no te conocen."}, {"n": "Caparazón Dorsal", "c": 2, "d": "Los ataques desde la retaguardia no obtienen Ventaja por esa posición. No anula sorpresa ni invisibilidad."}, {"n": "Cicatrización Rápida", "c": 2, "d": "Al comenzar un Descanso Corto, recuperas 1d6 de Resistencia adicional."}, {"n": "Defensa Natural", "c": 2, "d": "Obtienes +1 estable a Defensa por protección biológica."}, {"n": "Ecolocalización", "c": 2, "d": "Percibes entorno en radio 10 m sin depender de la vista. No permite leer, distinguir colores ni funciona en silencio mágico o ruido extremo."}, {"n": "Empatía Animal", "c": 2, "d": "Comunicas emociones e intenciones básicas a animales no sapientes. No es conversación compleja ni control mental."}, {"n": "Espinas Retráctiles", "c": 2, "d": "Si una criatura te agarra o apresa directamente, sufre 1d6−2 Cortante o Penetrante."}, {"n": "Estómago Carroñero", "c": 2, "d": "Puedes alimentarte de carne cruda o podrida natural sin enfermar. No protege de venenos deliberados."}, {"n": "Exoesqueleto", "c": 2, "d": "Obtienes +2 Defensa por placas naturales. No puedes usar armadura convencional encima; funciona como alternativa a armadura."}, {"n": "Feromonas", "c": 2, "d": "Ventaja social para persuadir, calmar o atraer criaturas biológicamente compatibles. No es control mental."}, {"n": "Fotosíntesis", "c": 2, "d": "Tras 4 horas de luz solar suficiente, no necesitas comer ese día. Sigues necesitando agua y descanso."}, {"n": "Membranas Interdigitales", "c": 2, "d": "Nadas a velocidad terrestre normal y tienes Ventaja en maniobras de agarre bajo agua. No permite respirar bajo agua."}, {"n": "Memoria Prodigiosa", "c": 2, "d": "Ventaja para recordar información vista, escuchada, leída o experimentada directamente."}, {"n": "Metabolismo Eficiente", "c": 2, "d": "Necesitas la mitad de comida y agua para evitar hambre, sed o Fatiga por privación."}, {"n": "Miembros Elásticos", "c": 2, "d": "Puedes extender miembros hasta el doble de su longitud. Puede aumentar alcance natural 1,5 m si el Diseñador lo permite."}, {"n": "Movimiento Especial", "c": 2, "d": "Obtienes una forma de movimiento adicional igual a tu velocidad terrestre: trepar o nadar."}, {"n": "Naturaleza Adicional", "c": 2, "d": "Ganas una Naturaleza extra a tu elección."}, {"n": "Paso Ligero Avanzado", "c": 2, "d": "Te mueves sin penalización sobre nieve profunda, barro, agua poco profunda, vegetación baja o fango."}, {"n": "Resistencia a Venenos", "c": 2, "d": "Ventaja en todas las Salvaciones contra venenos."}, {"n": "Resistencia Mágica", "c": 2, "d": "Ventaja en Salvaciones contra efectos de Técnicas. No reduce daño automáticamente."}, {"n": "Saliva Corrosiva", "c": 2, "d": "Como acción, escupes ácido a 5 m: 1d6 Corrosivo e ignora 2 armadura. 1/Descanso Largo puede ser 2d6."}, {"n": "Sangre Fría", "c": 2, "d": "Inmune a pánico y miedo no mágico; Desventaja para detectar amenazas repentinas si dependes de alarma instintiva."}, {"n": "Sentido del Peligro", "c": 2, "d": "No puedes ser sorprendido mientras estés consciente y obtienes +2 a Iniciativa en el primer turno."}, {"n": "Sentidos Agudos", "c": 2, "d": "Ventaja en percepción dependiente de un sentido elegido."}, {"n": "Vínculo de Manada", "c": 2, "d": "Mientras haya un aliado consciente a 5 m, Ventaja en Salvaciones contra efectos mentales."}, {"n": "Visión en la Oscuridad", "c": 2, "d": "Ves en oscuridad total como penumbra, sin colores. No atraviesa niebla, humo o oscuridad mágica absoluta."}], "mayor": [{"n": "Armadura Natural Superior", "c": 3, "d": "Obtienes +3 Defensa por protección biológica. No puedes usar armadura convencional encima; puede acumularse con escudo si la anatomía lo permite."}, {"n": "Cambio de Forma Menor", "c": 3, "d": "Como acción, adoptas una forma alternativa concreta definida al crear la Herencia. No copia individuos ni sana daño."}, {"n": "Camuflaje Natural", "c": 3, "d": "Ventaja en Sigilo visual en un entorno elegido; quienes te detecten visualmente pueden sufrir Desventaja si no te vieron moverte."}, {"n": "Comunicación Telepática Menor", "c": 3, "d": "Comunicas pensamientos simples, emociones o frases breves con criaturas sapientes a 10 m. No lee mentes ni controla."}, {"n": "Regeneración Menor", "c": 3, "d": "Al terminar combate o comenzar Descanso Corto, recuperas 1d6 adicional. Daños antirregenerativos pueden bloquearla hasta Descanso Largo."}, {"n": "Sentido Ciego", "c": 3, "d": "Percibes criaturas y obstáculos en radio 10 m sin vista. Definir mecanismo y contramedidas."}, {"n": "Tamaño Grande", "c": 3, "d": "+5 Resistencia máxima y +1 a Cuerpo para fuerza bruta, carga, empuje, levantar, romper o resistir desplazamientos."}, {"n": "Vuelo Real", "c": 3, "d": "Puedes volar a velocidad terrestre normal. Requiere Alas; coste efectivo mínimo +4 PH. No con armadura media/pesada ni carga excesiva.", "req": "Requiere Alas (+1 PH)."}, {"n": "Voz Hipnótica", "c": 3, "d": "Como acción, una criatura a 10 m que te oiga hace Salvación Aura ND 12 o queda Fascinada hasta el final de tu próximo turno."}, {"n": "Visión Verdadera Menor", "c": 3, "d": "A 10 m distingues ilusiones visuales menores, disfraces simples, cambios de forma incompletos y camuflaje natural."}, {"n": "Cuerpo Colosal Controlado", "c": 3, "d": "+10 Resistencia máxima y Ventaja en Cuerpo para resistir empujones, derribos, arrastres o desplazamientos forzados."}, {"n": "Corazón Doble", "c": 3, "d": "1/Descanso Largo, cuando caerías a 0 Resistencia por daño, quedas en 1 Resistencia."}, {"n": "Resistencia Primigenia", "c": 3, "d": "Elige un tipo de daño; ignoras 3 puntos de ese daño cada vez que lo recibes."}, {"n": "Mente Inquebrantable", "c": 3, "d": "Ventaja en Salvaciones de Aura contra miedo, control mental, confusión, fascinación o compulsión; 1/Descanso Largo repites una fallida."}, {"n": "Sangre Adaptativa", "c": 3, "d": "Tras Descanso Largo eliges una adaptación hasta el siguiente: venenos, enfermedades, frío, calor o +1 contra agotamiento de viaje."}, {"n": "Piel de Hierro", "c": 3, "d": "Ignoras 1 punto de daño físico Cortante, Penetrante o Contundente y tienes Ventaja contra cortes, fracturas o aplastamiento."}, {"n": "Órgano Sensorial Superior", "c": 3, "d": "Elige un sentido especial superior. Ventaja en percepción basada en él y acceso a información sensorial no común, con contramedidas."}, {"n": "Adaptación Extrema a un Bioma", "c": 3, "d": "En un bioma extremo elegido: Ventaja contra peligros ambientales, +1 para refugio/orientación/recursos y sin penalización por terreno típico."}, {"n": "Nervios de Relámpago", "c": 3, "d": "+2 Iniciativa. 1/Descanso Corto puedes moverte 3 m extra para acercarte a amenaza, alejarte de peligro o alcanzar cobertura."}, {"n": "Presencia Aterradora", "c": 3, "d": "Como acción, un hostil a 6 m hace Salvación Aura ND 12 o queda Asustado hasta el final de tu próximo turno."}, {"n": "Respiración Perfecta", "c": 3, "d": "Aguantas la respiración una hora y tienes Ventaja contra humo, gases no mágicos, aire viciado o irritantes inhalados."}]}, "d": {"menor": [{"n": "Apetito Voraz", "c": -1, "d": "Tras una jornada intensa sin comida adecuada, Desventaja en Cuerpo para esfuerzo prolongado hasta comer suficiente y descansar 1 hora."}, {"n": "Ojos Sensibles", "c": -1, "d": "Luz intensa o destellos: Desventaja en percepción visual, ataques a distancia y precisión visual mientras dure y unos minutos después; en combate hasta fin del próximo turno."}, {"n": "Comportamiento Compulsivo", "c": -1, "d": "Si no puedes cumplir un hábito breve definido, Desventaja en Aura para concentración, calma, paciencia o autocontrol hasta hacerlo o priorizar peligro inmediato."}, {"n": "Curiosidad Mórbida", "c": -1, "d": "Ante algo extraño o peligroso no investigado, Salvación Aura ND 9 para ignorarlo; si fallas, Desventaja en Aura para atender otros asuntos mientras siga presente."}, {"n": "Fobia Común", "c": -1, "d": "Ante estímulo elegido, Desventaja en Aura para calma o miedo mientras represente presión real; Salvación Aura ND 10 para acercarte voluntariamente."}, {"n": "Fragilidad Térmica", "c": -1, "d": "En calor, frío o cambios bruscos definidos, Desventaja en Salvaciones de Cuerpo contra peligros ambientales mientras estés expuesto sin protección."}, {"n": "Marca Evidente", "c": -1, "d": "Desventaja para ocultar tu Herencia, pasar por otra especie o evitar que reconozcan rasgos distintivos ante inspección cercana."}, {"n": "Metabolismo Delicado", "c": -1, "d": "Con comida desconocida, muy especiada o mal conservada, Desventaja en Salvaciones de Cuerpo contra malestar hasta Descanso Corto o tratamiento."}, {"n": "Movimiento Lento", "c": -1, "d": "Tu velocidad base se reduce en 3 m. Puede tomarse máximo dos veces si la Herencia sigue siendo jugable."}, {"n": "Necesidad de Humedad", "c": -1, "d": "Tras una jornada en ambiente s te, recibes +2 adicional. Mitigable con armadura, escudo o protección."}]}}, "monstruoso": {"ofensivo": {"v": {"menor": [{"n": "Alcance Extendido", "c": 1, "d": "Tus ataques naturales aumentan su alcance en 3 m. No afecta armas fabricadas ni Técnicas."}, {"n": "Arrollador", "c": 1, "d": "Si avanzas 3 m en línea recta contra criatura menor/ligera, puede quedar Derribada con Salvación Destreza ND 12. 1/turno, sin daño."}, {"n": "Golpe con Impulso", "c": 1, "d": "Tras moverte 5 m en línea recta, tu ataque natural impactado inflige +1 daño. 1/turno."}, {"n": "Garras Aferradoras", "c": 1, "d": "Al impactar con ataque natural de agarre, puedes intentar Apresar como Acción Rápida. 1/turno."}, {"n": "Colmillos Sangrantes", "c": 1, "d": "Si un ataque natural Cortante/Penetrante causa daño, el objetivo sufre 1 daño al final de su próximo turno. 1/turno, no acumulable."}, {"n": "Embestida Temeraria", "c": 1, "d": "Antes de ataque cuerpo a cuerpo: si impactas +2 daño; luego −2 Defensa hasta inicio de tu próximo turno. 1/turno."}, {"n": "Apéndice Funcional", "c": 1, "d": "Miembro adicional, cola o tentáculo útil para objetos simples. En acciones complejas o bajo presión sufre Desventaja; no ataca."}], "medio": [{"n": "Percepción de Combate", "c": 2, "d": "Combates sin penalizadores por no ver al objetivo si está dentro del alcance de tu sentido alternativo definido."}, {"n": "Mandíbulas Corrosivas", "c": 2, "d": "1/turno tus ataques corrosivos o mordidas ácidas ignoran 1 armadura; 1/Descanso Largo pueden dañar armadura hasta reparación."}, {"n": "Anatomía Letal", "c": 2, "d": "1/turno, si tu ataque natural supera la Defensa por 4 o más, inflige +2 daño."}, {"n": "Drenaje Vital Menor", "c": 2, "d": "1/Descanso Corto, al dañar con ataque natural a criatura viva, recuperas la mitad del daño infligido."}, {"n": "Toque Debilitante", "c": 2, "d": "1/turno, al impactar con ataque natural, el objetivo sufre −1 a su próxima tirada antes del final de su próximo turno."}, {"n": "Veneno Nat function renderTabs(){ document.getElementById('tabs').innerHTML = TABS.map(([id,label])=>`<button class="tab-btn ${currentTab===id?'active':''}" onclick="setTab('${id}')">${label}</button>`).join(''); }
function renderCreador(){ const total=traits.reduce((s,t)=>s+t.c,0); const hasDis=traits.some(t=>t.c<0); let issues=[]; if(total!==0) issues.push(`Balance: ${total>0?'+':''}${total} PH (debe ser 0)`); if(traits.length<2) issues.push('Mínimo 2 rasgos'); if(traits.length>9) issues.push('Máximo 9 rasgos'); if(!hasDis) issues.push('Falta al menos una desventaja'); if(!basics.name) issues.push('Falta nombre'); if(!basics.nature) issues.push('Falta naturaleza'); const valid=issues.length===0;
return `<div class="card"><div class="card-title">Reglas de construcción</div><div class="rules-grid"><div class="rule-item"><div class="ri-label">Balance</div>La suma total debe ser 0 PH.</div><div class="rule-item"><div class="ri-label">Rasgos</div>Entre 2 y 9 rasgos.</div><div class="rule-item"><div class="ri-label">Desventaja</div>Al menos una desventaja mecánica.</div><div class="rule-item"><div class="ri-label">Tiempo</div>Sin “escena” como medida mecánica ni “primera tirada después de X”.</div></div></div><div class="main-grid"><div><div class="card"><div class="card-title">Información Básica</div><div style="display:flex;flex-direction:column;gap:14px"><div><label>Nombre *</label><input id="nameInput" value="${esc(basics.name)}" placeholder="Ej: Dras, Crice, Ulsas..."></div><div><label>Naturaleza *</label><select id="natureInput"><option value="">Selecciona...</option>${NATURALEZAS.map(n=>`<option value="${esc(n)}" ${basics.nature===n?'selected':''}>${esc(n)}</option>`).join('')}</select></div><div><label>Descripción</label><textarea id="descInput" rows="3" placeholder="Concepto narrativo de la Herencia...">${esc(basics.desc)}</textarea></div></div></div><div class="card"><div class="card-title blue">Añadir rasgos</div><div class="note"><strong>Catálogos separados</strong>La pestaña Creador ya no repite la Biblioteca Base. Para añadir rasgos, abre una de las pestañas de catálogo y pulsa el rasgo que quieras incorporar a esta Herencia.</div><div class="rules-grid"><button class="export-btn enabled" onclick="setTab('base')">Abrir Biblioteca Base</button><button class="export-btn enabled" onclick="setTab('monstruoso')">Abrir Catálogo Monstruoso</button><button class="export-btn enabled" onclick="setTab('social')">Abrir Catálogo Social</button><button class="export-btn enabled" onclick="setTab('cultural')">Abrir Catálogo Cultural</button></div></div></div><div class="sticky-panel"><div class="card"><div class="card-title">Tu Herencia</div><div class="balance-box"><div class="balance-num" style="color:${total===0?'var(--green)':'var(--red)'}">${total>0?'+':''}${total}</div><div class="balance-label">PH</div></div>${issues.length?`<div class="issue-box"><b>Incompleta</b>${issues.map(x=>`<div>• ${esc(x)}</div>`).join('')}</div>`:`<div class="valid-box">✓ Herencia válida</div>`}<div style="max-height:420px;overflow-y:auto;margin-bottom:12px">${traits.length===0?'<div style="text-align:center;color:#9a8060;padding:22px 0;font-style:italic">Selecciona rasgos para comenzar</div>':traits.map(t=>`<div class="trait-chip" style="border-left-color:${t.c>0?'var(--green)':'var(--red)'}"><div class="tc-head"><div><div class="tc-name">${esc(t.n)}</div><div class="tc-desc">${esc(t.d)}</div>${t.req?`<div class="t-prereq">⚑ ${esc(t.req)}</div>`:''}</div><div><b style="color:${t.c>0?'var(--green)':'var(--red)'}">${t.c>0?'+':''}${t.c}</b><br><button class="del-btn" onclick="delTrait(${t.id})">×</button></div></div></div>`).join('')}</div><div style="border-top:1px solid rgba(184,135,42,.3);padding-top:10px;margin-bottom:10px;font-size:.82rem;display:flex;justify-content:space-between"><span>Rasgos: ${traits.length}/9</span><span>Ventajas: ${traits.filter(t=>t.c>0).length} | Desvs: ${traits.filter(t=>t.c<0).length}</span></div><button class="export-btn enabled" onclick="exportText()">Exportar como texto</button></div></div></div>`; }
function afterCreadorRender(){ ['name','nature','desc'].forEach(k=>{ const el=document.getElementById(k+'Input'); if(el) el.oninput=e=>{ basics[k]=e.target.value; }; }); }
function exportText(){
  const total = traits.reduce((s,t)=>s+t.c,0);
  const ventajas = traits.filter(t=>t.c>0);
  const desventajas = traits.filter(t=>t.c<0);
  const fecha = new Date().toLocaleDateString('es-CL');
  let txt = '';
  txt += '═══════════════════════════════════════\n';
  txt += 'HERENCIA: ' + (basics.name || 'SIN NOMBRE').toUpperCase() + '\n';
  txt += '═══════════════════════════════════════\n\n';
  txt += 'Fecha de exportación: ' + fecha + '\n\n';
  if (basics.desc) txt += basics.desc + '\n\n';
  txt += 'NATURALEZA: ' + (basics.nature || 'Sin definir') + ' (gratuita, no cuenta en PH)\n\n';
  txt += '───────────────────────────────────────\n';
  txt += 'VENTAJAS\n';
  txt += '───────────────────────────────────────\n';
  if (!ventajas.length) txt += 'Sin ventajas seleccionadas.\n';
  ventajas.forEach(t => {
    txt += '\n◆ ' + t.n + ' (+' + t.c + ' PH)\n';
    txt += '  ' + t.d + '\n';
    if (t.req) txt += '  Prerequisito/nota: ' + t.req + '\n';
    if (t.note) txt += '  Nota: ' + t.note + '\n';
  });
  txt += '\n───────────────────────────────────────\n';
  txt += 'DESVENTAJAS\n';
  txt += '───────────────────────────────────────\n';
  if (!desventajas.length) txt += 'Sin desventajas seleccionadas.\n';
  desventajas.forEach(t => {
    txt += '\n◆ ' + t.n + ' (' + t.c + ' PH)\n';
    txt += '  ' + t.d + '\n';
    if (t.req) txt += '  Prerequisito/nota: ' + t.req + '\n';
    if (t.note) txt += '  Nota: ' + t.note + '\n';
  });
  txt += '\n───────────────────────────────────────\n';
  txt += 'BALANCE\n';
  txt += '───────────────────────────────────────\n';
  txt += 'Balance total: ' + (total > 0 ? '+' : '') + total + ' PH\n';
  txt += 'Número de rasgos: ' + traits.length + '\n';
  txt += 'Ventajas: ' + ventajas.length + '\n';
  txt += 'Desventajas: ' + desventajas.length + '\n';
  txt += '\nRegla de validez: 0 PH, entre 2 y 9 rasgos, Naturaleza definida y al menos una desventaja mecánica.\n';
  txt += '═══════════════════════════════════════\n';

  const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (basics.name || 'herencia_sin_nombre').replace(/\s+/g,'_') + '_herencia.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function referencias(){ const by={}; CONCEPTOS.forEach(c=>c[1].split('/').map(s=>s.trim()).forEach(t=>{ by[t]=by[t]||[]; by[t].push(c[0]); })); const h=`<div class="catalog-grid"><div class="card"><div class="card-title">Naturalezas</div><div class="ref-grid">${NATURALEZAS.map(n=>`<div class="rule-item">${esc(n)}</div>`).join('')}</div></div><div class="card"><div class="card-title blue">Resumen de Conceptos</div>${Object.entries(by).map(([t,arr])=>`<div class="rule-item"><div class="ri-label">${esc(t)}</div>${esc(arr.join(', '))}</div>`).join('')}</div></div><div class="card"><div class="card-title purple">Catálogo de Conceptos</div><table><thead><tr><th>Concepto</th><th>Tipo(s)</th><th>Área</th></tr></thead><tbody>${CONCEPTOS.map(c=>`<tr><td><b>${esc(c[0])}</b></td><td>${esc(c[1])}</td><td>${esc(c[2])}</td></tr>`).join('')}</tbody></table></div>`; return withSidebar(h); }
function render(){ rebuildAllTraits(); renderTabs(); let html=''; if(currentTab==='creador') html=renderCreador(); else if(currentTab==='base') html=baseCatalog(); else if(currentTab==='monstruoso') html=multiCatalog(DATA.monstruoso,'Catálogo Monstruoso','Rasgos anatómicos, ofensivos, defensivos y extraordinarios revisados para Herencias jugables.'); else if(currentTab==='social') html=multiCatalog(DATA.social,'Catálogo Social','Rasgos sociales con base biológica o innata: roles, manada, colmena, linaje y señales corporales.'); else if(currentTab==='cultural') html=multiCatalog(DATA.cultural,'Catálogo Cultural','Rasgos culturales en PH para construir Herencias: entrenamiento, tradición, oficio, prestigio, tabúes y redes comunitarias.'); else html=referencias(); document.getElementById('content').innerHTML=html; if(currentTab==='creador') afterCreadorRender(); }
render();
</script>
</body>
</html>
